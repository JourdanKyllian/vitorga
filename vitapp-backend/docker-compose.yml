version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: vitapp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vitapp
    ports:
      - '5432:5432'
    volumes:
      - vitapp_data:/var/lib/postgresql/data

volumes:
  vitapp_data: